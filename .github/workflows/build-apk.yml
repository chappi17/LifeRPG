name: 🏗️ APK 빌드

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: ☕ Java 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔧 Gradle 설치
        run: |
          curl -sL "https://services.gradle.org/distributions/gradle-8.6-bin.zip" -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.6/bin" >> $GITHUB_PATH

      - name: 📋 gradle.properties 확인 및 보완
        run: |
          echo "=== gradle.properties 내용 ==="
          cat gradle.properties || echo "(파일 없음)"
          # 혹시 없거나 설정이 빠진 경우를 위한 보험
          grep -q "android.useAndroidX" gradle.properties 2>/dev/null || echo "android.useAndroidX=true" >> gradle.properties
          grep -q "android.enableJetifier" gradle.properties 2>/dev/null || echo "android.enableJetifier=true" >> gradle.properties
          echo "=== 최종 gradle.properties ==="
          cat gradle.properties

      - name: 🏗️ Debug APK 빌드
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: 📤 APK 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: 루틴퀘스트-APK-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: ✅ 완료
        run: echo "🎉 빌드 성공! Actions 탭 → Artifacts에서 APK 다운로드"
